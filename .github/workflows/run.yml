name: Run Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"  # 每30分钟运行一次

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run agent
        run: python agent.py
